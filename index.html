<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مراجعة المتقدمين — Content Creator</title>
<style>
  :root{
    --bg: #0F1115;
    --panel: #171A21;
    --panel-2: #1D212B;
    --border: #2A2E38;
    --text: #ECEEF2;
    --text-dim: #9AA1AE;
    --accent: #E8B04B;
    --accent-soft: rgba(232,176,75,.12);
    --good: #6FCF97;
    --warn: #E2A03F;
    --bad: #E2604B;
    --radius: 14px;
    font-family: 'Tajawal', 'Cairo', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    padding-bottom: 60px;
  }
  header{
    padding: 32px 24px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top:0;
    background: rgba(15,17,21,.92);
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  h1{
    margin:0 0 4px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .sub{
    color: var(--text-dim);
    font-size: 13px;
  }
  .controls{
    display:flex;
    gap:10px;
    margin-top:16px;
    flex-wrap: wrap;
    align-items:center;
  }
  select, input[type=text]{
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
  }
  input[type=text]{ min-width: 200px; }
  .count-pill{
    background: var(--accent-soft);
    color: var(--accent);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-right: auto;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .card{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform .15s ease, border-color .15s ease;
    display:flex;
    flex-direction:column;
  }
  .card:hover{
    border-color: #3A3F4D;
    transform: translateY(-2px);
  }
  .card.out-of-cairo{
    border-color: rgba(226,96,75,.4);
    background: linear-gradient(180deg, rgba(226,96,75,.06), var(--panel));
  }
  .photo-wrap{
    width:100%;
    aspect-ratio: 1/1;
    background: var(--panel-2);
    position:relative;
    overflow:hidden;
  }
  .photo-wrap img{
    width:100%;
    height:100%;
    object-fit: cover;
    display:block;
  }
  .photo-fallback{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100%;
    color: var(--text-dim);
    font-size:12px;
    text-align:center;
    padding: 10px;
    gap: 10px;
  }
  .photo-fallback a{
    background: var(--accent);
    color:#1a1300;
    text-decoration:none;
    font-weight:800;
    font-size:12px;
    padding: 7px 14px;
    border-radius: 8px;
  }
  .view-photo-btn{
    position:absolute;
    bottom:10px;
    left:10px;
    background: rgba(0,0,0,.7);
    color:#fff;
    text-decoration:none;
    font-size:11px;
    padding: 5px 10px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
    font-weight:700;
  }
  .view-photo-btn:hover{ background: rgba(0,0,0,.9); }
  .location-tag{
    position:absolute;
    top:10px;
    left:10px;
    background: rgba(0,0,0,.65);
    color:#fff;
    font-size:11px;
    padding: 4px 9px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }
  .location-tag.far{
    background: rgba(226,96,75,.85);
  }
  .body{
    padding: 14px 16px 16px;
    display:flex;
    flex-direction:column;
    gap: 10px;
    flex:1;
  }
  .name{
    font-size: 16px;
    font-weight: 700;
  }
  .role-tag{
    display:inline-block;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--panel-2);
    padding: 3px 9px;
    border-radius: 6px;
    width: fit-content;
  }
  .meta-row{
    display:flex;
    justify-content:space-between;
    font-size: 12.5px;
    color: var(--text-dim);
    border-top: 1px dashed var(--border);
    padding-top: 8px;
  }
  .meta-row b{ color: var(--text); font-weight:600; }
  .salary{
    font-size: 15px;
    font-weight: 800;
    color: var(--accent);
  }
  .links{
    display:flex;
    gap: 8px;
    margin-top: 4px;
  }
  .links a{
    flex:1;
    text-align:center;
    text-decoration:none;
    font-size: 12px;
    padding: 8px 6px;
    border-radius: 8px;
    font-weight: 700;
    transition: opacity .15s;
  }
  .links a:hover{ opacity:.85; }
  .link-portfolio{
    background: var(--accent);
    color: #1a1300;
  }
  .link-cv{
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .link-disabled{
    background: var(--panel-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    pointer-events:none;
    opacity: .5;
  }
  .exp-pill{
    font-size:11px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight:700;
    width:fit-content;
  }
  .exp-junior{ background: rgba(226,96,75,.15); color: var(--bad); }
  .exp-mid{ background: rgba(226,160,63,.15); color: var(--warn); }
  .exp-senior{ background: rgba(111,207,151,.15); color: var(--good); }

  footer.note{
    text-align:center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 30px 20px 10px;
  }
</style>
</head>
<body>

<header>
  <h1>مراجعة المتقدمين — Content Creator</h1>
  <div class="sub">Evolve Agency · تحديث تلقائي حسب الفلاتر</div>
  <div class="controls">
    <select id="filterLocation">
      <option value="all">كل الأماكن</option>
      <option value="cairo">القاهرة والجيزة فقط</option>
      <option value="far">برة القاهرة (مميز بالأحمر)</option>
    </select>
    <select id="filterSalary">
      <option value="all">كل المرتبات</option>
      <option value="10">لغاية 10,000</option>
      <option value="12">لغاية 12,000</option>
      <option value="15">لغاية 15,000</option>
    </select>
    <select id="sortBy">
      <option value="default">الترتيب الافتراضي</option>
      <option value="salary-asc">المرتب: من الأقل للأعلى</option>
      <option value="salary-desc">المرتب: من الأعلى للأقل</option>
    </select>
    <input type="text" id="searchBox" placeholder="ابحث بالاسم..." />
    <button id="refreshBtn" style="background:var(--accent);color:#1a1300;border:none;padding:9px 16px;border-radius:8px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit">🔄 تحديث الآن</button>
    <span class="count-pill" id="countPill">0 متقدمة</span>
  </div>
</header>

<div class="grid" id="grid"></div>

<footer class="note">
  الصور والبورتفوليوهات مأخوذة من روابط Google Drive و Canva اللي بعتوها المتقدمات — لو رابط مش شغال، جرب تفتحه في المتصفح مباشرة.
</footer>

<script>
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYm7A2wveh2fSVDUC_susIaW1gOg883A0ljvE_g-7Bo6B-XkiKLWudodhnBJeATWdDQ7lfRJOiCZcK/pub?output=csv";

let candidates = [];

// Simple CSV parser that handles quoted fields with commas/newlines inside
function parseCSV(text){
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;

  for(let i=0; i<text.length; i++){
    const char = text[i];
    const next = text[i+1];

    if(inQuotes){
      if(char === '"' && next === '"'){ field += '"'; i++; }
      else if(char === '"'){ inQuotes = false; }
      else{ field += char; }
    } else {
      if(char === '"'){ inQuotes = true; }
      else if(char === ','){ row.push(field); field=''; }
      else if(char === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(char === '\r'){ /* skip */ }
      else{ field += char; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

function guessFar(address){
  if(!address) return false;
  const cairoKeywords = ['قاهرة','جيزة','cairo','giza','مصر الجديدة','نصر','مهندسين','هرم','شبرا','مقطم','عباسية','رحاب','شروق','تجمع','زايد','اكتوبر','أكتوبر','معادي','دقي','زمالك','حلوان','وراق','نزهة','قبة','سويس'];
  const lower = address.toLowerCase();
  return !cairoKeywords.some(k => lower.includes(k.toLowerCase()));
}

function normalizeSalary(raw){
  if(!raw) return {salary:0, note: 'غير محدد'};
  const cleaned = raw.toString().replace(/[,٬]/g,'').trim();
  // Try to extract first number (handles "15k", "12000", "15-20k", ranges etc.)
  const kMatch = cleaned.match(/(\d+(\.\d+)?)\s*k/i);
  if(kMatch) return {salary: parseFloat(kMatch[1]) * 1000, note: null};
  const numMatch = cleaned.match(/(\d{3,6})/);
  if(numMatch) return {salary: parseInt(numMatch[1]), note: null};
  return {salary: 0, note: raw};
}

function normalizeExp(raw){
  if(!raw) return "غير محدد";
  if(raw.includes('0 - 6') || raw.includes('0-6')) return "0-6 شهور";
  if(raw.includes('1 - 3') || raw.includes('1-3')) return "1-3 سنين";
  if(raw.toLowerCase().includes('more')) return "3+ سنين";
  return raw;
}

async function loadCandidates(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-dim)">جاري تحميل المتقدمين...</div>';

  try{
    const res = await fetch(SHEET_CSV_URL + '&t=' + Date.now());
    if(!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const rows = parseCSV(text);
    const headers = rows[0].map(h => h.trim());

    const idx = {
      timestamp: headers.findIndex(h=>h.toLowerCase().includes('timestamp')),
      position: headers.findIndex(h=>h.toLowerCase().includes('position')),
      name: headers.findIndex(h=>h.toLowerCase().includes('full name')),
      contact: headers.findIndex(h=>h.toLowerCase().includes('contact')),
      address: headers.findIndex(h=>h.toLowerCase().includes('address')),
      salary: headers.findIndex(h=>h.toLowerCase().includes('salary')),
      photo: headers.findIndex(h=>h.toLowerCase().includes('photo')),
      exp: headers.findIndex(h=>h.toLowerCase().includes('experience')),
      age: headers.findIndex(h=>h.toLowerCase().includes('age')),
      portfolio: headers.findIndex(h=>h.toLowerCase().includes('portfolio')),
      cv: headers.findIndex(h=>h.toLowerCase().includes('cv')),
    };

    candidates = rows.slice(1)
      .filter(r => r.length > 1 && r[idx.name] && r[idx.name].trim())
      .map(r=>{
        const salInfo = normalizeSalary(r[idx.salary]);
        return {
          name: r[idx.name]?.trim() || 'بدون اسم',
          location: r[idx.address]?.trim() || 'غير محدد',
          far: guessFar(r[idx.address]),
          salary: salInfo.salary,
          note: salInfo.note,
          exp: normalizeExp(r[idx.exp]),
          age: r[idx.age]?.trim() || '-',
          photo: r[idx.photo]?.trim() || null,
          portfolio: r[idx.portfolio]?.trim() || null,
          cv: r[idx.cv]?.trim() || null,
          timestamp: r[idx.timestamp]?.trim() || '',
        };
      })
      .reverse(); // newest first

    applyFilters();
  } catch(err){
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--bad)">
      حصل خطأ في تحميل البيانات من الشيت.<br>
      <span style="font-size:12px;color:var(--text-dim)">تأكد إن اللينك لسه published ومتاح، أو جرب تعمل Refresh للصفحة.</span>
    </div>`;
    console.error(err);
  }
}

function expLevel(exp){
  if(exp.includes("0-6")) return {c:"exp-junior", label: exp};
  if(exp.includes("1-3")) return {c:"exp-mid", label: exp};
  return {c:"exp-senior", label: exp};
}

function extractDriveId(url){
  if(!url) return null;
  const match = url.match(/id=([a-zA-Z0-9_-]+)/) || url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return match ? match[1] : null;
}

function driveThumb(url){
  const id = extractDriveId(url);
  if(!id) return null;
  return `https://lh3.googleusercontent.com/d/${id}=w400`;
}

function driveDirectLink(url){
  const id = extractDriveId(url);
  if(!id) return url;
  return `https://drive.google.com/file/d/${id}/view`;
}

function render(list){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('countPill').textContent = list.length + ' متقدمة';

  list.forEach(c=>{
    const exp = expLevel(c.exp);
    const thumb = driveThumb(c.photo);
    const directLink = driveDirectLink(c.photo);
    const card = document.createElement('div');
    card.className = 'card' + (c.far ? ' out-of-cairo' : '');

    card.innerHTML = `
      <div class="photo-wrap">
        ${thumb ? `<img src="${thumb}" alt="${c.name}" onerror="this.parentElement.innerHTML='<div class=photo-fallback>الصورة مش قادرة تفتح هنا<br><a href=&quot;${directLink}&quot; target=_blank>افتح الصورة من Drive</a></div>'">` : `<div class="photo-fallback">مفيش لينك صورة<br></div>`}
        ${c.photo ? `<a class="view-photo-btn" href="${directLink}" target="_blank">🔗 فتح الصورة</a>` : ''}
        <span class="location-tag ${c.far ? 'far' : ''}">${c.location}</span>
      </div>
      <div class="body">
        <div class="name">${c.name}</div>
        <span class="exp-pill ${exp.c}">${exp.label} · ${c.age} سنة</span>
        <div class="meta-row">
          <span>المرتب المتوقع</span>
          <span class="salary">${c.salary > 0 ? c.salary.toLocaleString('en-US') + ' ج' : (c.note || 'غير محدد')}</span>
        </div>
        <div class="links">
          ${c.portfolio ? `<a class="link-portfolio" href="${c.portfolio}" target="_blank">البورتفوليو</a>` : `<span class="link-disabled">مفيش بورتفوليو</span>`}
          ${c.cv ? `<a class="link-cv" href="${c.cv}" target="_blank">CV</a>` : ''}
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function applyFilters(){
  let list = [...candidates];

  const loc = document.getElementById('filterLocation').value;
  if(loc === 'cairo') list = list.filter(c=>!c.far);
  if(loc === 'far') list = list.filter(c=>c.far);

  const sal = document.getElementById('filterSalary').value;
  if(sal !== 'all') list = list.filter(c=> c.salary > 0 && c.salary <= parseInt(sal)*1000);

  const search = document.getElementById('searchBox').value.trim().toLowerCase();
  if(search) list = list.filter(c=> c.name.toLowerCase().includes(search));

  const sort = document.getElementById('sortBy').value;
  if(sort === 'salary-asc') list.sort((a,b)=> (a.salary||99999) - (b.salary||99999));
  if(sort === 'salary-desc') list.sort((a,b)=> (b.salary||0) - (a.salary||0));

  render(list);
}

['filterLocation','filterSalary','sortBy'].forEach(id=>{
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('searchBox').addEventListener('input', applyFilters);
document.getElementById('refreshBtn').addEventListener('click', loadCandidates);

loadCandidates();
// Auto-refresh every 60 seconds so new submissions show up automatically
setInterval(loadCandidates, 60000);
</script>

</body>
</html>
